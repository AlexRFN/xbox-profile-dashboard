  * { margin: 0; padding: 0; box-sizing: border-box; }

    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    backdrop-filter: blur(8px);

  #tooltip.show { opacity: 1; }
  #tooltip .tt-title { color: #fff; font-weight: 600; margin-bottom: 5px; font-size: .9rem; }
  #tooltip .tt-detail { color: #9ca3af; }

  .legend {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 18px;

  .legend-item { display: flex; align-items: center; gap: 6px; font-size: .72rem; color: #777; }

</style>

<script>
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.node').forEach(node => {
  node.style.cursor = 'default';
  node.addEventListener('mouseenter', e => {
    const tip = node.dataset.tip;
    if (!tip) return;
    const [title, ...rest] = tip.split('|');
    tooltip.innerHTML = `<div class="tt-title">${title}</div>` +
      (rest.length ? `<div class="tt-detail">${rest.join('<br>')}</div>` : '');
    tooltip.classList.add('show');
  });
  node.addEventListener('mousemove', e => {
    const pad = 16;
    let x = e.clientX + pad, y = e.clientY + pad;
    const r = tooltip.getBoundingClientRect();
    if (x + r.width > window.innerWidth) x = e.clientX - r.width - pad;
    if (y + r.height > window.innerHeight) y = e.clientY - r.height - pad;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  });
  node.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
});
</script>
