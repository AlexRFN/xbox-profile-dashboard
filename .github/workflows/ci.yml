name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov pyright ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (pyright)
        run: pyright

      - name: Tests + coverage
        run: python -m pytest
        env:
          # Suppress Xbox API calls in CI — tests use the test DB fixture
          OPENXBL_API_KEY: dummy-key-for-ci

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          # CVE-2026-3219 (pip 26.0.1, no fix published as of 2026-04-24) is
          # against the runner-preinstalled pip itself, not a project dep.
          # Drop the --ignore-vuln once pip publishes a patched release.
          pip-audit --skip-editable --ignore-vuln CVE-2026-3219
