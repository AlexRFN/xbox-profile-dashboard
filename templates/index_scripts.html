{% if stats.total_games > 0 %}
<script>
var _statsData = {{ stats | tojson }};
function _runCharts() { initDashboardCharts(_statsData); }
function _workerChartsOk() {
    return typeof OffscreenCanvas !== 'undefined' &&
        typeof HTMLCanvasElement !== 'undefined' &&
        typeof HTMLCanvasElement.prototype.transferControlToOffscreen === 'function';
}
function _ensureChartsThenRun() {
    // Worker path owns Chart.js inside charts.worker.js — main thread skips the download.
    if (_workerChartsOk()) { _runCharts(); return; }
    if (typeof Chart !== 'undefined') {
        _runCharts();
    } else {
        var _cs = document.createElement('script');
        _cs.src = '{{ static_url("js/vendor/chart.umd.min.js") }}';
        _cs.onload = _runCharts;
        document.head.appendChild(_cs);
    }
}
// Charts live in a worker thread — no contention with the entrance animation
// on the main thread. Kick off on the next frame so layout is settled.
function _scheduleCharts() {
    if (_workerChartsOk()) {
        requestAnimationFrame(_ensureChartsThenRun);
    } else if (typeof requestIdleCallback !== 'undefined') {
        // Main-thread fallback path — yield so Chart.js layout doesn't stall entrance.
        requestIdleCallback(_ensureChartsThenRun, { timeout: 1500 });
    } else {
        setTimeout(_ensureChartsThenRun, 300);
    }
}
// Wait for DOMContentLoaded so the deferred app.js bundle has executed and
// initDashboardCharts is defined — otherwise a cached Chart.js can race ahead.
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _scheduleCharts);
} else {
    _scheduleCharts();
}
</script>
{% endif %}
